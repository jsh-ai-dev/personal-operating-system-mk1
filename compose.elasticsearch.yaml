services:
  app:
    environment:
      POS_ELASTICSEARCH_URIS: http://elasticsearch:9200
      POS_SEARCH_ELASTICSEARCH_ENABLED: "true"
    depends_on:
      elasticsearch:
        condition: service_started

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.0
    container_name: personal-operating-system-mk1-elasticsearch
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: -Xms512m -Xmx512m
    ports:
      - "${POS_ELASTICSEARCH_BIND:-127.0.0.1}:${POS_ELASTICSEARCH_PORT:-9200}:9200"
    volumes:
      - personal-operating-system-mk1-elasticsearch-data:/usr/share/elasticsearch/data
    restart: unless-stopped

volumes:
  personal-operating-system-mk1-elasticsearch-data:
