services:
  postgres:
    image: postgres:16-alpine
    container_name: pos-postgres
    environment:
      POSTGRES_DB: ${POS_DB_NAME:-personal_operating_system}
      POSTGRES_USER: ${POS_DB_USERNAME:-pos}
      POSTGRES_PASSWORD: ${POS_DB_PASSWORD:-pos}
      TZ: ${POS_DB_TZ:-Asia/Seoul}
    ports:
      - "5432:5432"
    volumes:
      - pos-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: pos-redis
    ports:
      - "6379:6379"
    volumes:
      - pos-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.0
    container_name: pos-elasticsearch
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: -Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - pos-elasticsearch-data:/usr/share/elasticsearch/data

volumes:
  pos-postgres-data:
  pos-redis-data:
  pos-elasticsearch-data:


