<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/common :: head('로그인')}"></head>
<body>
<div th:replace="~{layout/common :: header}"></div>
<main class="site-shell page-stack auth-page">
    <section class="auth-hero panel">
        <div>
            <p class="eyebrow">PROJECT 1 · THYMELEAF</p>
            <h1>로그인</h1>
            <p class="subtle">노트 화면은 로그인 후 사용할 수 있습니다. 개발 단계에서는 설정 파일의 초기 계정(seed)으로 바로 들어갈 수 있어요.</p>
        </div>
        <div class="auth-hint">
            <p><strong>초기 계정(seed)</strong></p>
            <ul>
                <li>아이디: <code>pos-admin</code></li>
                <li>비밀번호: <code>pos-admin1234</code></li>
            </ul>
            <p class="subtle">환경변수 <code>POS_SECURITY_USERNAME</code>, <code>POS_SECURITY_PASSWORD</code>로 바꿀 수 있습니다.</p>
        </div>
    </section>

    <section class="panel auth-card">
        <div th:if="${param.error}" class="error-banner">아이디 또는 비밀번호가 올바르지 않습니다.</div>
        <div th:if="${param.logout}" class="message">로그아웃되었습니다.</div>

        <form class="auth-form" th:action="@{/login}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

            <div class="row">
                <label for="username">아이디</label>
                <input class="input" id="username" name="username" type="text" autocomplete="username" placeholder="아이디를 입력하세요">
            </div>

            <div class="row">
                <label for="password">비밀번호</label>
                <input class="input" id="password" name="password" type="password" autocomplete="current-password" placeholder="비밀번호를 입력하세요">
            </div>

            <div class="actions auth-actions">
                <button class="btn btn-primary" type="submit">로그인</button>
            </div>
        </form>
    </section>
</main>
</body>
</html>
