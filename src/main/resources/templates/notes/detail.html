<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/common :: head('노트 상세')}"></head>
<body>
<div th:replace="~{layout/common :: header}"></div>
<h1 th:text="${note.title}">제목</h1>

<div th:if="${message}" th:text="${message}"></div>

<div class="meta meta-spaced">
    <span th:text="${note.visibility}">PRIVATE</span>
    <span> | 태그: </span>
    <span th:text="${tagsDisplay}">-</span>
    <span> | 북마크: </span>
    <span th:text="${note.bookmarked} ? 'ON' : 'OFF'">OFF</span>
</div>

<pre th:text="${note.content}">본문</pre>

<div class="actions">
    <a th:href="@{|/notes/${note.id}/edit|}">수정</a>

    <form th:if="${!note.bookmarked}" th:action="@{|/notes/${note.id}/bookmark|}" method="post">
        <button type="submit">북마크</button>
    </form>

    <form th:if="${note.bookmarked}" th:action="@{|/notes/${note.id}/unbookmark|}" method="post">
        <button type="submit">북마크 해제</button>
    </form>

    <form th:action="@{|/notes/${note.id}/delete|}" method="post" onsubmit="return confirm('정말 삭제할까요?');">
        <button type="submit">삭제</button>
    </form>
</div>

<p><a href="/notes">목록으로</a></p>
</body>
</html>
