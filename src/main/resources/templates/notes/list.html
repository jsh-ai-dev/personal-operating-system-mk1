<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/common :: head('노트 목록')}"></head>
<body>
<div th:replace="~{layout/common :: header}"></div>
<main class="site-shell page-stack">
    <section class="page-title-row">
        <div>
            <h1>노트 목록</h1>
            <p class="subtle">검색과 북마크 필터로 필요한 노트를 빠르게 찾을 수 있어요.</p>
        </div>
        <div class="btn-group">
            <a class="btn btn-primary" href="/notes/new">새 노트 만들기</a>
            <form method="post" action="/notes/upload" enctype="multipart/form-data" class="upload-form">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <label class="btn btn-ghost upload-label" title=".txt 또는 .pdf 파일을 노트로 가져옵니다">
                    📂 파일 가져오기
                    <input type="file" name="file" accept=".txt,.pdf,text/plain,application/pdf" class="upload-input" onchange="this.form.submit()">
                </label>
            </form>
        </div>
    </section>

    <div th:if="${message}" class="message" th:text="${message}"></div>

    <form method="get" action="/notes" class="panel search-row">
        <input class="input" type="text" name="keyword" placeholder="제목/본문 검색" th:value="${keyword}">
        <input type="hidden" name="page" value="0">
        <input type="hidden" name="size" th:value="${size}">
        <select class="input input-inline" name="sort">
            <option value="recent" th:selected="${sort == 'recent'}">최신 수정순</option>
            <option value="title" th:selected="${sort == 'title'}">제목순</option>
            <option value="relevance" th:selected="${sort == 'relevance'}">관련도순</option>
        </select>
        <label class="checkbox-inline">
            <input type="checkbox" name="bookmarkedOnly" value="true" th:checked="${bookmarkedOnly}">
            북마크만 보기
        </label>
        <button class="btn" type="submit">검색</button>
        <a class="btn btn-ghost" href="/notes">초기화</a>
    </form>

    <div th:if="${#lists.isEmpty(notes)}" class="panel empty">
        아직 노트가 없습니다. 첫 노트를 작성해보세요.
    </div>

    <section class="note-grid" th:if="${!#lists.isEmpty(notes)}">
        <article th:each="note : ${notes}" class="note-card">
            <div class="note-head">
                <h2><a th:href="@{|/notes/${note.id}|}" th:text="${note.title}">제목</a></h2>
                <div class="note-card-badges">
                    <span class="file-badge" th:if="${note.hasStoredFile}" title="원본 파일 저장됨">PDF</span>
                    <span class="file-badge file-badge-txt"
                          th:if="${note.originalFileName != null and !note.hasStoredFile and #strings.endsWith(#strings.toLowerCase(note.originalFileName), '.txt')}"
                          title="텍스트 파일 업로드 노트">TXT</span>
                    <span class="summary-badge" th:if="${note.aiSummary != null}" title="AI 요약 저장됨">요약</span>
                    <span class="bookmark" th:if="${note.bookmarked}" title="북마크됨">★</span>
                </div>
            </div>
            <p class="note-content" th:if="${!note.hasStoredFile}" th:text="${note.content}">본문</p>
            <p class="note-content" th:if="${note.hasStoredFile}">PDF 파일 노트입니다. 상세 화면에서 다운로드할 수 있습니다.</p>
            <div class="meta">
                <span class="badge" th:text="${note.visibility}">PRIVATE</span>
                <span th:if="${note.originalFileName != null}">파일: <strong th:text="${note.originalFileName}">-</strong></span>
                <span th:text="${tagsDisplayById[note.id]}">-</span>
                <span>생성: <strong th:text="${createdAtDisplayById[note.id]}">-</strong></span>
                <span>수정: <strong th:text="${updatedAtDisplayById[note.id]}">-</strong></span>
            </div>
            <div class="search-snippet" th:if="${highlightsById != null and highlightsById[note.id] != null}">
                <p th:if="${highlightsById[note.id].title != null}">제목: <span th:utext="${highlightsById[note.id].title}">-</span></p>
                <p th:if="${highlightsById[note.id].summary != null}">요약: <span th:utext="${highlightsById[note.id].summary}">-</span></p>
                <p th:if="${highlightsById[note.id].content != null}">본문: <span th:utext="${highlightsById[note.id].content}">-</span></p>
            </div>
        </article>
    </section>

    <nav class="panel" th:if="${totalElements > 0}">
        <div class="btn-group" style="justify-content: space-between; width: 100%; align-items: center; gap: 12px; flex-wrap: wrap;">
            <div class="btn-group">
                <a class="btn btn-ghost"
                   th:if="${hasPrevious}"
                   th:href="@{/notes(keyword=${keyword}, bookmarkedOnly=${bookmarkedOnly}, sort=${sort}, page=${page - 1}, size=${size})}">이전</a>
                <span class="subtle" th:unless="${hasPrevious}">이전</span>
            </div>

            <div class="btn-group" style="flex-wrap: wrap;" th:if="${totalPages > 1}">
                <a th:each="pageNumber : ${pageNumbers}"
                   class="btn"
                   th:classappend="${pageNumber == page} ? ' btn-primary' : ' btn-ghost'"
                   th:href="@{/notes(keyword=${keyword}, bookmarkedOnly=${bookmarkedOnly}, sort=${sort}, page=${pageNumber}, size=${size})}"
                   th:text="${pageNumber + 1}">1</a>
            </div>

            <div class="btn-group" style="align-items: center; gap: 8px;">
                <span class="subtle" th:text="|${currentPageDisplay} / ${totalPages} · 총 ${totalElements}건|">1 / 1 · 총 0건</span>
                <a class="btn btn-ghost"
                   th:if="${hasNext}"
                   th:href="@{/notes(keyword=${keyword}, bookmarkedOnly=${bookmarkedOnly}, sort=${sort}, page=${page + 1}, size=${size})}">다음</a>
                <span class="subtle" th:unless="${hasNext}">다음</span>
            </div>
        </div>
    </nav>
</main>
</body>
</html>
